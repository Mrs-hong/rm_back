serviceName: mariadb
version: 10.3.39
autoStart: false

execution:
  command: ./bin/mysqld
  workDir: .
  dataDir: ./data
  args: ["--defaults-file=./data/my.cnf  --datadir=./data", "--port=3306", "--bind-address=127.0.0.1"]

resources:
  ports: [3306]
